run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - gosimple
    - ineffassign
    - unused
    - misspell

linters-settings:
  gofmt:
    simplify: true

issues:
  exclude-rules:
    # test files can use broad assertions
    - path: _test\.go
      linters:
        - errcheck
